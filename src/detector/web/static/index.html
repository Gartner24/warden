<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WARDEN Defender Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-4">
  <div class="max-w-4xl mx-auto">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-white">WARDEN Defender Panel</h1>
      <div id="detector-status" class="px-3 py-1 rounded-full text-sm font-medium bg-gray-700 text-gray-300">
        Inactivo
      </div>
    </div>

    <!-- Threat Indicator -->
    <div id="threat-state" class="threat-idle rounded-xl p-6 mb-6 flex items-center gap-4">
      <div class="w-5 h-5 rounded-full threat-dot"></div>
      <div>
        <div id="threat-label" class="text-lg font-bold">Detector no iniciado</div>
        <div id="threat-sublabel" class="text-sm opacity-75">Configure y pulse Iniciar</div>
      </div>
    </div>

    <!-- Counters -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
      <div class="bg-gray-800 rounded-lg p-4 text-center">
        <div id="count-BEACON_FLOOD" class="text-3xl font-bold text-yellow-400">0</div>
        <div class="text-xs text-gray-400 mt-1">Beacon Flood</div>
      </div>
      <div class="bg-gray-800 rounded-lg p-4 text-center">
        <div id="count-DEAUTH" class="text-3xl font-bold text-orange-400">0</div>
        <div class="text-xs text-gray-400 mt-1">Deauth</div>
      </div>
      <div class="bg-gray-800 rounded-lg p-4 text-center">
        <div id="count-EVIL_TWIN" class="text-3xl font-bold text-red-400">0</div>
        <div class="text-xs text-gray-400 mt-1">Evil Twin</div>
      </div>
      <div class="bg-gray-800 rounded-lg p-4 text-center">
        <div id="count-CADENA_OFENSIVA" class="text-3xl font-bold text-purple-400">0</div>
        <div class="text-xs text-gray-400 mt-1">Cadena Ofensiva</div>
      </div>
    </div>

    <!-- Detector Config + Controls -->
    <div class="bg-gray-800 rounded-xl p-4 mb-6">
      <h2 class="font-semibold text-gray-200 mb-3">Configuracion del detector</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
        <div>
          <label class="block text-xs text-gray-400 mb-1">BSSID protegido (red a vigilar)</label>
          <input id="input-bssid" type="text" placeholder="E4:AB:89:D6:9B:80"
            class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm font-mono text-white" />
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">SSID protegido</label>
          <input id="input-ssid" type="text" placeholder="RVGREDES 2.4"
            class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm text-white" />
        </div>
      </div>
      <div id="detector-error" class="hidden mb-3 text-sm text-red-400"></div>
      <div id="detector-success" class="hidden mb-3 text-sm text-green-400"></div>
      <div class="flex gap-3 flex-wrap">
        <button id="btn-start" onclick="startDetector()"
          class="px-4 py-2 bg-green-600 hover:bg-green-700 rounded-lg font-medium transition-colors">
          Iniciar detector
        </button>
        <button id="btn-stop" onclick="stopDetector()"
          class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg font-medium transition-colors">
          Detener
        </button>
        <button id="btn-reset" onclick="resetSession()"
          class="px-4 py-2 bg-gray-600 hover:bg-gray-700 rounded-lg font-medium transition-colors">
          Resetear sesion
        </button>
      </div>
    </div>

    <!-- Interface Status -->
    <div class="bg-gray-800 rounded-xl p-4 mb-6">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-semibold text-gray-200">Interfaz de captura (panda0)</h2>
        <span id="iface-mode-badge" class="px-3 py-1 rounded-full text-sm font-medium bg-gray-700 text-gray-300">
          Verificando...
        </span>
      </div>
      <div class="mb-3">
        <label class="block text-xs text-gray-400 mb-1">Canal a monitorear (debe coincidir con el canal del router)</label>
        <input id="input-channel" type="number" min="1" max="13" value="6"
          class="w-24 bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm text-white" />
      </div>
      <div id="iface-error" class="hidden mb-3 text-sm text-red-400"></div>
      <div class="flex gap-3 flex-wrap">
        <button onclick="setMonitorMode()"
          class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition-colors">
          Activar modo monitor
        </button>
        <button onclick="setManagedMode()"
          class="px-4 py-2 bg-gray-600 hover:bg-gray-700 rounded-lg font-medium transition-colors">
          Volver a modo normal
        </button>
      </div>
    </div>

    <!-- Alert List -->
    <div class="bg-gray-800 rounded-xl p-4">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-semibold text-gray-200">Alertas</h2>
        <span id="alert-total" class="text-xs text-gray-500">0 total</span>
      </div>
      <ul id="alerts" class="space-y-2 max-h-96 overflow-y-auto"></ul>
      <p id="no-alerts" class="text-gray-500 text-sm text-center py-4">Sin alertas registradas</p>
    </div>
  </div>
  <script src="/panel.js"></script>
</body>
</html>
